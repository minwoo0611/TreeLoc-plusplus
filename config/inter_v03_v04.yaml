# TreeLoc++ full inter-session configuration for Wild_V03 query vs Wild_V04 map.

dataset:
  mode: inter  # Evaluation mode: intra or inter.
  query_root: data/Wild_V03  # Query dataset root with trajectory.txt and TreeManagerState_*.csv.
  map_root: data/Wild_V04  # Map dataset root with trajectory.txt and TreeManagerState_*.csv.
  frame_limit: 0  # Number of frames loaded from each root; 0 loads every discovered frame.

evaluation:
  gt_radius_m: 5.0  # Ground-truth XY radius in meters.
  localization_translation_threshold_m: 0.5  # Translation threshold for R@50 and SR.
  localization_rotation_threshold_deg: 5.0  # Rotation threshold for R@50 and SR.
  use_test_regions: true  # Whether inter queries are filtered by benchmark test regions.
  test_region_family: auto  # Test region family: auto, wild_v, or wild_k.

retrieval:
  recall_at_k: 1  # Top-k cutoff used for reported recall.
  tdh_top_k: 100  # Number of TDH/pairwise candidates before hash reranking.
  hash_rerank_top_k: 10  # Number of candidates kept after triangle-hash reranking.

tree_selection:
  target_tree_count: 30  # Target number of trees used per frame.
  local_radius_m: 30.0  # Local XY radius for tree selection.
  supplemental_score_min: -1.0  # Minimum score for non-reconstructed supplemental trees.
  dedup_radius_m: 0.1  # Minimum XY spacing when deduplicating augmented trees.

neighbor_augmentation:
  enabled: true  # Whether nearby frames can supplement sparse frames.
  past_only: true  # Whether augmentation only uses past frames.
  max_neighbor_frames: 5  # Maximum neighboring frames used for augmentation.
  search_radius_m: 10.0  # XY radius for selecting augmentation neighbors.
  min_reconstructed_trees: 10  # Reconstructed-tree count below which augmentation is attempted.

tdh:
  use_reconstructed_only: false  # Whether Tree Distribution Histogram uses only reconstructed trees.
  dbh_min_m: 0.0  # Minimum DBH descriptor value.
  dbh_max_m: 0.8  # Maximum DBH descriptor value before the overflow bin.
  dbh_sections: 8  # Number of DBH sections in TDH.
  dbh_bin_width_m: 0.15  # Width of each DBH section.
  spatial_bin_interval_m: 6.0  # Distance step between TDH spatial bins.
  spatial_bin_padding_m: 1.0  # Overlap added around TDH spatial bins.
  spatial_bin_count: 5  # Number of TDH spatial bins.
  spatial_min_m: 0.0  # Minimum TDH spatial-bin distance.
  spatial_max_m: 30.0  # Maximum TDH spatial-bin distance.

pairwise_context:
  use_reconstructed_only: true  # Whether pairwise context uses only reconstructed trees.
  min_distance_m: 0.0  # Minimum pairwise tree distance.
  max_distance_m: 10.0  # Maximum pairwise tree distance.
  bin_count: 40  # Number of pairwise distance histogram bins.
  max_sampled_pairs: 5000  # Maximum sampled tree pairs per frame.
  soft_binning: false  # Whether pairwise distances are softly assigned to adjacent bins.

triangle_descriptor:
  knn_neighbors: 15  # KNN count used when forming local tree triangles.
  min_edge_m: 0.5  # Minimum triangle edge length.
  max_edge_m: 30.0  # Maximum triangle edge length.
  edge_quantization_m: 0.15  # Triangle edge-length quantization step.
  hash_base: 100007  # Polynomial hash base for triangle hashes.
  hash_modulus: 50000000  # Modulus for triangle hash values.

translation_aware_overlap:
  enabled: true  # Whether transform scoring uses translation-aware overlap.
  mode: exp  # Translation-aware overlap mode.
  tau_m: 5.0  # Decay scale for translation-aware overlap.
  power: 2.0  # Exponent for translation-aware overlap.

yaw_voting:
  enabled: true  # Whether triangle matches vote for yaw initialization.
  bin_deg: 5.0  # Yaw-vote bin size in degrees.
  inlier_tolerance_deg: 10.0  # Yaw-vote inlier tolerance in degrees.
  min_triangle_inliers: 2  # Minimum triangle inliers needed for yaw initialization.

dbh_matching:
  enabled: true  # Whether DBH consistency is used in triangle matching.
  difference_tolerance_m: 0.2  # Allowed DBH difference for matched trees.
  match_distance_tolerance_m: 0.4  # Allowed post-transform tree distance.

pose_refinement:
  enabled: true  # Whether z, roll, and pitch correction is estimated.
  ransac_iterations: 200  # RANSAC iterations for 6-DoF pose refinement.
  ransac_min_sample: 4  # Minimum tree-pair sample size for pose refinement.
  z_inlier_tolerance_m: 0.1  # Z residual threshold for refinement inliers.
  z_inlier_ratio: 0.5  # Minimum inlier ratio for accepting pose refinement.

pose_edges:
  enabled: false  # Whether GTSAM-compatible pose edge files are written.
  output_dir: results/pose_edges  # Directory for pose_<map>_vs_<query>.txt edge files.
  prefix: pose  # Prefix used for exported pose edge filenames.
